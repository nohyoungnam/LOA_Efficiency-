version: v68
note: 직업/세팅 자동 분류와 아이덴티티 보완룰. v68은 디스트로이어 집속/해방 스킬 그룹과 3코어 해방 기준을 우선 보강합니다. API Tooltip에서 직접 읽히는 수치를 우선 적용하고, API에 드러나지 않는 대표 아이덴티티 수치만 verified_identity_effects로 보완합니다.
  나머지 직업은 직업/아이덴티티 분류만 먼저 수행하고, 수치가 검증된 경우에만 계산 룰을 추가합니다.
